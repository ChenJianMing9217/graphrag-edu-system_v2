name: Deploy v7

on:
  workflow_run:
    workflows: ["Build and Push Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy .env from runner host
        run: cp $HOME/edu_sys_v7_secrets/.env .env

      - name: Pull and up
        run: |
          docker compose -p edu_sys_v7 -f docker-compose.yml pull
          docker compose -p edu_sys_v7 -f docker-compose.yml up -d
