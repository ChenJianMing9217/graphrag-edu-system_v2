services:
  app:
    image: ghcr.io/chenjianming9217/graphrag-edu-system_v2:latest
    build: .
    restart: unless-stopped

    ports:
      - "5002:5000"

    env_file:
      - .env

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN}

    volumes:
      - hf_cache_v7:/root/.cache/huggingface

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hf_cache_v7:
