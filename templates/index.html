<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot v7 - 智能早療諮詢</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown & Sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert2 深色主題適配 */
        .swal2-popup {
            background-color: #242424 !important;
            color: #ECECF1 !important;
            border: 1px solid #4D4D4F !important;
        }
        .swal2-title, .swal2-html-container {
            color: #ECECF1 !important;
        }
        .swal2-confirm {
            background-color: #10A37F !important;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand"></div>
        <div class="nav-actions" id="navActions">
            <!-- <button class="auth-btn-top" onclick="openModal('loginModal')">輸入存取碼</button> -->
            <button class="auth-btn-top auth-btn-primary" onclick="openModal('loginModal')">輸入存取碼 / 登入</button>
        </div>
    </nav>

    <!-- Main Chat Area -->
    <div class="chat-container">
        <!-- <div class="chat-header">EduBot v7 - 早療諮詢助手</div> -->
        
        <div class="chat-messages" id="chatMessages">
            <!-- Splash View (Initial) -->
            <div class="splash" id="splashView">
                <h1 style="font-family: 'Outfit', sans-serif;">早療發展諮詢</h1>
                <div class="splash-options">
                    <div class="option-card" onclick="setInput('解釋一下粗大動作的分數代表什麼？')">
                        <h3>解釋分數</h3>
                        <p>「解釋一下粗大動作的分數代表什麼？」</p>
                    </div>
                    <div class="option-card" onclick="setInput('針對社交適應領域有什麼具體的居家練習建議？')">
                        <h3>居家建議</h3>
                        <p>「針對社交適應領域有什麼具體的居家練習建議？」</p>
                    </div>
                    <div class="option-card" onclick="document.getElementById('fileInput').click()">
                        <h3>上傳報告</h3>
                        <p>拍照或上傳 PDF 電子檔，立即開始分析。</p>
                    </div>
                    <div class="option-card" onclick="openModal('loginModal')">
                        <h3>輸入存取碼</h3>
                        <p>若您已有兒童 ID，輸入即可獲取歷史紀錄。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <!-- 回應長度切換 -->
            <div class="length-switch" role="tablist" aria-label="回應長度">
                <button class="length-pill is-active" data-length="auto"     type="button" title="LLM 自動依問題複雜度判斷（預設）">自動</button>
                <button class="length-pill"           data-length="concise"  type="button" title="精簡 ≦350 字">簡短</button>
                <button class="length-pill"           data-length="standard" type="button" title="標準 ≦700 字">標準</button>
                <button class="length-pill"           data-length="detailed" type="button" title="詳細 ≦1300 字">詳細</button>
            </div>
            <div class="input-container">
                <input type="file" id="fileInput" style="display:none">
                <i class="fa-solid fa-paperclip upload-icon" onclick="document.getElementById('fileInput').click()"></i>
                <textarea class="chat-input" id="chatInput" placeholder="輸入訊息或上傳檔案..." rows="1"></textarea>
                <i class="fa-solid fa-paper-plane send-icon" id="sendBtn"></i>
            </div>
            <div class="input-footer">
                EduBot v7 可能會產生錯誤資訊，請結合臨床醫師專業意見參考。
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <h2 style="margin-bottom: 10px; font-family: 'Outfit', sans-serif;">進入對話</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">請輸入 8 位數兒童存取碼以讀取資料</p>
            <input type="text" placeholder="例如：ABC12345" id="accessCode" style="text-align: center; font-size: 18px; letter-spacing: 2px;">
            <button class="auth-btn auth-btn-primary" style="margin-top: 10px; width: 100%;" onclick="loginWithCode()">開始分析</button>
            <button class="auth-btn-secondary" onclick="closeModal('loginModal')">取消</button>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        function setInput(text) {
            document.getElementById('chatInput').value = text;
        }

        // ============ 回應長度切換 ============
        function getResponseLength() {
            return localStorage.getItem('response_length') || 'auto';
        }
        function setResponseLength(v) {
            localStorage.setItem('response_length', v);
            document.querySelectorAll('.length-pill').forEach(b => {
                b.classList.toggle('is-active', b.dataset.length === v);
            });
        }
        // 初始化（從 localStorage 還原使用者上次選擇）
        document.addEventListener('DOMContentLoaded', () => {
            const cur = getResponseLength();
            setResponseLength(cur);
            document.querySelectorAll('.length-pill').forEach(b => {
                b.addEventListener('click', () => setResponseLength(b.dataset.length));
            });
        });

        // ============ 引用標註渲染 ============
        function renderSources(sources) {
            if (!sources) return '';
            const report = (sources.report || []).filter(s => s && s.domain);
            const local = (sources.local_resources || []);
            const ext = !!sources.external_required;
            if (report.length === 0 && local.length === 0 && !ext) return '';

            let html = '<div class="message-sources">';
            html += '<div class="sources-title"><i class="fa-solid fa-book"></i> 資料來源</div>';
            if (report.length) {
                html += '<ul class="sources-list">';
                for (const s of report) {
                    const domain = escapeHtml(s.domain || '');
                    const section = escapeHtml(s.section || '');
                    html += `<li><span class="src-domain">${domain}</span><span class="src-sep">›</span><span class="src-section">${section}</span></li>`;
                }
                html += '</ul>';
            }
            if (local.length) {
                html += '<div class="sources-sub">在地資源 / 補助：</div><ul class="sources-list">';
                for (const r of local) {
                    html += `<li><span class="src-domain">${escapeHtml(r.category||'')}</span><span class="src-sep">›</span><span class="src-section">${escapeHtml(r.title||'')}</span></li>`;
                }
                html += '</ul>';
            }
            if (ext && report.length === 0 && local.length === 0) {
                html += '<div class="sources-note">外部資料來源：請見回答末段。</div>';
            }
            html += '</div>';
            return html;
        }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // ============ 智慧捲動：使用者捲離底部時不強制拉回 ============
        const _SCROLL_BOTTOM_THRESHOLD = 80;  // 距底部 80px 內視為「貼近底部」
        function isNearBottom() {
            const c = document.getElementById('chatMessages');
            if (!c) return true;
            return (c.scrollHeight - c.scrollTop - c.clientHeight) <= _SCROLL_BOTTOM_THRESHOLD;
        }
        function scrollToBottomIfFollowing() {
            const c = document.getElementById('chatMessages');
            if (c && isNearBottom()) c.scrollTop = c.scrollHeight;
        }
        function forceScrollToBottom() {
            const c = document.getElementById('chatMessages');
            if (c) c.scrollTop = c.scrollHeight;
        }

        // ============ 生成狀態鎖：avoid 重複送訊息 ============
        let isGenerating = false;
        function setGenerating(state) {
            isGenerating = state;
            const sendBtn = document.getElementById('sendBtn');
            const input   = document.getElementById('chatInput');
            if (sendBtn) {
                sendBtn.classList.toggle('is-disabled', state);
            }
            if (input) {
                // 允許繼續打字（可先草擬下一題），只是按不到送出
                input.placeholder = state
                    ? '回應生成中，送出鍵已暫停（生成完成後恢復）…'
                    : '輸入訊息或上傳檔案...';
            }
        }

        // ============ 複製整則訊息 ============
        function copyMessage(btn) {
            const main = btn.closest('.message-main') || btn.closest('.message-content');
            const body = main && main.querySelector('.message-body');
            if (!body) return;
            const text = body.innerText.trim();
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.querySelector('i');
                const orig = icon.className;
                icon.className = 'fa-solid fa-check';
                btn.classList.add('is-copied');
                setTimeout(() => {
                    icon.className = orig;
                    btn.classList.remove('is-copied');
                }, 1400);
            }).catch(e => console.warn('copy failed', e));
        }

        // ============ 複製單個 code block ============
        function copyCodeBlock(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const pre = wrapper && wrapper.querySelector('pre');
            if (!pre) return;
            navigator.clipboard.writeText(pre.innerText).then(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> 已複製';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> 複製';
                }, 1400);
            });
        }

        // ============ 為 markdown 渲染後的 code blocks 加 header + copy ============
        function enhanceCodeBlocks(container) {
            if (!container) return;
            const pres = container.querySelectorAll('pre');
            pres.forEach(pre => {
                if (pre.parentElement && pre.parentElement.classList.contains('code-block-wrapper')) return;
                const code = pre.querySelector('code');
                let lang = '';
                if (code && code.className) {
                    const m = code.className.match(/language-([\w+-]+)/);
                    if (m) lang = m[1];
                }
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                const header = document.createElement('div');
                header.className = 'code-block-header';
                header.innerHTML = `
                    <span class="code-block-lang">${escapeHtml(lang || 'code')}</span>
                    <button class="code-block-copy" onclick="copyCodeBlock(this)">
                        <i class="fa-regular fa-copy"></i> 複製
                    </button>
                `;
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
        }

        // Auto-resize textarea & Enter to Send
        const tx = document.getElementById('chatInput');
        if (tx) {
            tx.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
                // 如果高度超過 200px 則顯示捲軸，否則隱藏
                if (this.scrollHeight > 200) {
                    this.style.overflowY = "auto";
                } else {
                    this.style.overflowY = "hidden";
                }
            }, false);

            tx.addEventListener("keydown", function(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    if (isGenerating) return;  // 生成中不准 Enter 送
                    document.getElementById('sendBtn').click();
                }
            });
        }

        // File Upload
        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = async function() {
            const file = fileInput.files[0];
            if (!file) return;

            addMessage(`正在上傳並解析報告：${file.name}...`, 'assistant');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    updateUI(true, data.child_name);
                    addMessage(data.message, 'assistant');
                } else {
                    addMessage(`上傳失敗：${data.message}`, 'assistant');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('系統連線失敗，無法完成上傳。', 'assistant');
            }
        };

        // Send message
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) {
            sendBtn.onclick = async function() {
                if (isGenerating) return;  // 生成中不准重複發送
                const input = document.getElementById('chatInput');
                const msg = input.value.trim();
                if(!msg) return;

                const splash = document.getElementById('splashView');
                if (splash) splash.style.display = 'none';

                addMessage(msg, 'user');
                input.value = '';
                input.style.height = "auto";

                showThinking();
                setGenerating(true);

                try {
                    const response = await fetch('/api/chat_stream', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            message: msg,
                            response_length: getResponseLength()
                        })
                    });
                    if (!response.ok || !response.body) {
                        hideThinking();
                        addMessage('連線失敗，請稍後再試。', 'assistant');
                        return;
                    }

                    // 建立空 bubble，邊收邊填字
                    let bubble = null;
                    let bodyEl = null;
                    let fbEl = null;
                    let accText = '';
                    let msgId = null;
                    let firstDeltaSeen = false;

                    let sourcesEl = null;
                    function ensureBubble() {
                        if (bubble) return;
                        const container = document.getElementById('chatMessages');
                        bubble = document.createElement('div');
                        bubble.className = 'message assistant';
                        bubble.innerHTML = `
                            <div class="message-content">
                                <div class="message-avatar avatar-bot"><i class="fa-solid fa-graduation-cap"></i></div>
                                <div class="message-main">
                                    <div class="message-body"></div>
                                    <div class="message-sources-mount"></div>
                                    <div class="message-toolbar">
                                        <button class="msg-action" title="複製" onclick="copyMessage(this)">
                                            <i class="fa-regular fa-copy"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(bubble);
                        bodyEl = bubble.querySelector('.message-body');
                        sourcesEl = bubble.querySelector('.message-sources-mount');
                        fbEl = bubble.querySelector('.message-toolbar');
                        // 第一次建 bubble 強制拉到底（這是新訊息）
                        forceScrollToBottom();
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });

                        // SSE 事件以 \n\n 分隔
                        const events = buffer.split('\n\n');
                        buffer = events.pop();
                        for (const evt of events) {
                            const line = evt.trim();
                            if (!line.startsWith('data:')) continue;
                            const json = line.slice(5).trim();
                            if (!json) continue;
                            let ev;
                            try { ev = JSON.parse(json); } catch (e) { continue; }

                            if (ev.type === 'delta') {
                                if (!firstDeltaSeen) {
                                    hideThinking();
                                    ensureBubble();
                                    firstDeltaSeen = true;
                                }
                                accText += ev.text;
                                bodyEl.innerHTML = renderMarkdownSafe(accText);
                                // 只在使用者貼近底部時才自動拉，避免使用者往上看時被打斷
                                scrollToBottomIfFollowing();
                            } else if (ev.type === 'done') {
                                msgId = ev.message_id;
                                if (!firstDeltaSeen) {
                                    // 沒收到任何 delta（極端情況）→ 至少顯示 done 事件中可能的訊息
                                    hideThinking();
                                    ensureBubble();
                                }
                                // 渲染資料來源
                                try {
                                    const sources = (ev.flow_state && ev.flow_state.sources) || null;
                                    if (sources && sourcesEl) {
                                        sourcesEl.innerHTML = renderSources(sources);
                                    }
                                } catch (e) { console.warn('renderSources failed', e); }
                                if (msgId && fbEl) {
                                    fbEl.id = `feedback-${msgId}`;
                                    // 已有複製鈕，附加 thumbs up/down
                                    fbEl.insertAdjacentHTML('beforeend', `
                                        <button class="msg-action" title="有幫助" onclick="submitFeedback('${msgId}', 1, this)">
                                            <i class="fa-regular fa-thumbs-up"></i>
                                        </button>
                                        <button class="msg-action" title="無幫助" onclick="submitFeedback('${msgId}', -1, this)">
                                            <i class="fa-regular fa-thumbs-down"></i>
                                        </button>
                                    `);
                                }
                                // streaming 結束後，code block 加 copy 按鈕
                                try { enhanceCodeBlocks(bodyEl); } catch (e) {}
                            } else if (ev.type === 'error') {
                                hideThinking();
                                addMessage('錯誤：' + (ev.error || '未知錯誤'), 'assistant');
                            }
                            // start 事件忽略（保留 thinking 直到第一個 delta）
                        }
                    }
                } catch (error) {
                    hideThinking();
                    console.error('Error:', error);
                    addMessage('連線失敗，請確認伺服器是否正常運作。', 'assistant');
                } finally {
                    setGenerating(false);
                    const inp = document.getElementById('chatInput');
                    if (inp) inp.focus();
                }
            };
        }

        function showThinking() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message assistant thinking';
            div.id = 'thinkingMsg';
            div.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar avatar-bot"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="message-main">
                        <div class="message-body">正在思考中</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinkingMsg');
            if (el) el.remove();
        }

        // Markdown 安全渲染
        function renderMarkdownSafe(text) {
            if (!text) return '';
            try {
                if (window.marked) {
                    marked.setOptions({ gfm: true, breaks: true });
                    let rawHtml = marked.parse(text);
                    // [Fix] marked auto-link 會把全形 ）／中文括號吃進 URL
                    // 例如「（https://www.mohw.gov.tw）」變成連結 https://www.mohw.gov.tw）
                    // post-process 把 href / link text 末尾的非 URL 字元剝掉
                    rawHtml = sanitizeAutoLinks(rawHtml);
                    if (window.DOMPurify) {
                        return DOMPurify.sanitize(rawHtml);
                    }
                    return rawHtml;
                }
                return text.replace(/\n/g, '<br>');
            } catch (e) {
                console.error('Markdown Render Error:', e);
                return text;
            }
        }

        // 把 auto-link 後跑進 URL 的中文標點 / 全形括號 / 句末符號剝掉，移到連結外面
        function sanitizeAutoLinks(html) {
            // URL 結尾不該包的字元（中文括號、引號、句末符號）
            const TRAIL = /[）)】」』,。、！？:;\]>]+$/;
            return html.replace(/<a([^>]*?)href="([^"]+)"([^>]*)>([^<]*)<\/a>/g, function(_, pre, href, post, label) {
                let trailingHref = '';
                let trailingLabel = '';
                let m;
                while ((m = href.match(TRAIL))) {
                    trailingHref = m[0] + trailingHref;
                    href = href.slice(0, -m[0].length);
                }
                while ((m = label.match(TRAIL))) {
                    trailingLabel = m[0] + trailingLabel;
                    label = label.slice(0, -m[0].length);
                }
                // 取兩者末尾相同部分作為「真的要剝掉的尾巴」
                const trail = trailingHref || trailingLabel || '';
                return `<a${pre}href="${href}"${post}>${label}</a>${trail}`;
            });
        }

        function addMessage(text, role, msgId = null, feedbackVal = 0, sources = null) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const content = role === 'assistant' ? renderMarkdownSafe(text) : escapeHtml(text);

            // 引用區塊（assistant 才會有 sources）
            let sourcesHtml = '';
            if (role === 'assistant') {
                try {
                    const html = renderSources(sources);
                    if (html) sourcesHtml = html;
                } catch (e) { console.warn('renderSources failed', e); }
            }

            // Toolbar (assistant 才有)
            let toolbarHtml = '';
            if (role === 'assistant') {
                const upActive  = feedbackVal === 1  ? 'is-active-up'   : '';
                const downActive= feedbackVal === -1 ? 'is-active-down' : '';
                let fbButtons = '';
                if (msgId) {
                    fbButtons = `
                        <button class="msg-action ${upActive}" title="有幫助" onclick="submitFeedback('${msgId}', 1, this)">
                            <i class="fa-regular fa-thumbs-up"></i>
                        </button>
                        <button class="msg-action ${downActive}" title="無幫助" onclick="submitFeedback('${msgId}', -1, this)">
                            <i class="fa-regular fa-thumbs-down"></i>
                        </button>`;
                }
                toolbarHtml = `
                    <div class="message-toolbar"${msgId ? ` id="feedback-${msgId}"` : ''}>
                        <button class="msg-action" title="複製" onclick="copyMessage(this)">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        ${fbButtons}
                    </div>`;
            }

            // Avatar
            const avatarHtml = role === 'assistant'
                ? `<div class="message-avatar avatar-bot"><i class="fa-solid fa-graduation-cap"></i></div>`
                : `<div class="message-avatar avatar-user"><i class="fa-solid fa-user"></i></div>`;

            div.innerHTML = `
                <div class="message-content">
                    ${avatarHtml}
                    <div class="message-main">
                        <div class="message-body">${content}</div>
                        <div class="message-sources-mount">${sourcesHtml}</div>
                        ${toolbarHtml}
                    </div>
                </div>
            `;
            container.appendChild(div);
            // assistant 訊息渲染後，code block 加 copy 按鈕
            if (role === 'assistant') {
                try { enhanceCodeBlocks(div.querySelector('.message-body')); } catch (e) {}
            }
            container.scrollTop = container.scrollHeight;
        }

        // 打字機效果
        function streamMessage(fullText, role, msgId = null) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            let toolbarHtml = '';
            if (role === 'assistant') {
                let fbButtons = '';
                if (msgId) {
                    fbButtons = `
                        <button class="msg-action" title="有幫助" onclick="submitFeedback('${msgId}', 1, this)">
                            <i class="fa-regular fa-thumbs-up"></i>
                        </button>
                        <button class="msg-action" title="無幫助" onclick="submitFeedback('${msgId}', -1, this)">
                            <i class="fa-regular fa-thumbs-down"></i>
                        </button>`;
                }
                toolbarHtml = `
                    <div class="message-toolbar"${msgId ? ` id="feedback-${msgId}"` : ''}>
                        <button class="msg-action" title="複製" onclick="copyMessage(this)">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        ${fbButtons}
                    </div>`;
            }

            const avatarHtml = role === 'assistant'
                ? `<div class="message-avatar avatar-bot"><i class="fa-solid fa-graduation-cap"></i></div>`
                : `<div class="message-avatar avatar-user"><i class="fa-solid fa-user"></i></div>`;

            div.innerHTML = `
                <div class="message-content">
                    ${avatarHtml}
                    <div class="message-main">
                        <div class="message-body"></div>
                        ${toolbarHtml}
                    </div>
                </div>
            `;
            container.appendChild(div);
            const body = div.querySelector('.message-body');

            let currentIndex = 0;
            const speed = 20;

            function type() {
                if (currentIndex < fullText.length) {
                    currentIndex += 3;
                    body.innerHTML = renderMarkdownSafe(fullText.slice(0, currentIndex));
                    container.scrollTop = container.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    body.innerHTML = renderMarkdownSafe(fullText);
                    try { enhanceCodeBlocks(body); } catch (e) {}
                    container.scrollTop = container.scrollHeight;
                }
            }
            type();
        }

        async function submitFeedback(msgId, value, el) {
            try {
                // UI update originally
                const container = document.getElementById(`feedback-${msgId}`);
                if (container) {
                    // 新版 toolbar：button.msg-action（複製鈕在第 1 個，thumbs up/down 在 2/3）
                    const btns = container.querySelectorAll('button.msg-action');
                    btns.forEach(b => {
                        b.classList.remove('is-active-up', 'is-active-down');
                    });
                    if (btns.length >= 3) {
                        if (value === 1) btns[1].classList.add('is-active-up');
                        if (value === -1) btns[2].classList.add('is-active-down');
                    }
                }

                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message_id: msgId, feedback: value})
                });
            } catch (err) {
                console.error("Feedback error", err);
            }
        }

        async function checkSession() {
            try {
                const response = await fetch('/api/session_status');
                const data = await response.json();
                if (data.is_logged_in) {
                    updateUI(true, data.child_name);
                    loadHistory();
                } else {
                    updateUI(false);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/chat_history');
                const data = await response.json();
                if (data.status === 'success' && data.history.length > 0) {
                    const container = document.getElementById('chatMessages');
                    const splash = document.getElementById('splashView');
                    
                    // 清空之前的對話與隱藏 Splash
                    if (splash) splash.style.display = 'none';
                    container.innerHTML = ''; 
                    
                    data.history.forEach(turn => {
                        addMessage(turn.content, turn.role, turn.id, turn.feedback, turn.sources);
                    });
                } else {
                    // 若無歷史紀錄，顯示歡迎提示
                    addMessage("歡迎回來！目前還沒有這份報告的對話紀錄。您可以直接針對報告提出問題，例如：「這份報告的初步評估建議是什麼？」", "assistant");
                }
            } catch (error) {
                console.error('Load History Error:', error);
            }
        }

        function updateUI(isLoggedIn, childName = "") {
            const navActions = document.getElementById('navActions');
            const brand = document.querySelector('.nav-brand');
            const splash = document.getElementById('splashView');

            let navHtml = `<button class="auth-btn-top" onclick="startNewChat()" style="background: transparent; border: 1px solid #ddd; color: var(--text-main);">開啟新對話</button>`;

            if (isLoggedIn) {
                navHtml += `<button class="auth-btn-top" onclick="logout()">登出</button>`;
                brand.innerHTML = `<i class="fa-solid fa-child-reaching" style="margin-right: 8px; color: var(--accent-primary);"></i>${childName} 小朋友的諮詢室`;
                if (splash) splash.style.display = 'none';
            } else {
                navHtml += `<button class="auth-btn-top auth-btn-primary" onclick="openModal('loginModal')">輸入存取碼 / 登入</button>`;
                brand.innerHTML = `<i class="fa-solid fa-robot" style="margin-right: 8px; color: var(--accent-primary);"></i>EduBot 智慧小幫手`;
                if (splash) splash.style.display = 'flex';
                document.getElementById('chatMessages').innerHTML = ''; // 清空對話
                // 重新放入 splash
                const splashDiv = document.createElement('div');
                splashDiv.className = 'splash';
                splashDiv.id = 'splashView';
                splashDiv.innerHTML = `
                    <h1 style="font-family: 'Outfit', sans-serif;">早療發展諮詢</h1>
                    <div class="splash-options">
                        <div class="option-card" onclick="setInput('解釋一下粗大動作的分數代表什麼？')">
                            <h3>解釋分數</h3>
                            <p>「解釋一下粗大動作的分數代表什麼？」</p>
                        </div>
                        <div class="option-card" onclick="setInput('針對社交適應領域有什麼具體的居家練習建議？')">
                            <h3>居家建議</h3>
                            <p>「針對社交適應領域有什麼具體的居家練習建議？」</p>
                        </div>
                        <div class="option-card" onclick="document.getElementById('fileInput').click()">
                            <h3>上傳報告</h3>
                            <p>拍照或上傳 PDF 電子檔，立即開始分析。</p>
                        </div>
                        <div class="option-card" onclick="openModal('loginModal')">
                            <h3>輸入存取碼</h3>
                            <p>若您已有兒童 ID，輸入即可獲取歷史紀錄。</p>
                        </div>
                    </div>
                `;
                document.getElementById('chatMessages').appendChild(splashDiv);
            }
            navActions.innerHTML = navHtml;
        }

        async function startNewChat() {
            try {
                const response = await fetch('/api/new_chat', {method: 'POST'});
                const data = await response.json();
                if (data.status === 'success') {
                    if (!data.is_logged_in) {
                        updateUI(false);
                    } else {
                        document.getElementById('chatMessages').innerHTML = '';
                        // 從導覽列抓取目前姓名 (格式: 🧒 姓名 小朋友的諮詢室)
                        const brandText = document.querySelector('.nav-brand').textContent;
                        const currentName = brandText.replace('小朋友的諮詢室', '').trim();
                        updateUI(true, currentName);
                        
                        // 加入新對話提示，避免畫面空白
                        addMessage("已開啟新對話。您可以針對目前的報告詢問任何問題，或是跟我聊聊孩子最近的發展情況喔！", "assistant");
                    }
                    Swal.fire({
                        icon: 'success',
                        title: '新對話',
                        text: data.message,
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function logout() {
            try {
                const response = await fetch('/api/logout', {method: 'POST'});
                const data = await response.json();
                if (data.status === 'success') {
                    updateUI(false);
                    Swal.fire({
                        icon: 'success',
                        title: '已登出',
                        text: data.message,
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        window.onload = checkSession;

        async function loginWithCode() {
            const codeInput = document.getElementById('accessCode');
            const code = codeInput.value.trim();
            if(!code) return Swal.fire({icon: 'warning', title: '提醒', text: '請輸入存取碼'});

            try {
                const response = await fetch('/api/login_with_code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code})
                });
                const data = await response.json();

                if (data.status === 'success') {
                    closeModal('loginModal');
                    updateUI(true, data.child_name);
                    Swal.fire({
                        icon: 'success',
                        title: '登入成功',
                        text: `歡迎回來，${data.child_name}！`,
                        timer: 2000,
                        showConfirmButton: false
                    });
                    loadHistory(); // 登入後載入該兒童歷史
                } else {
                    Swal.fire({icon: 'error', title: '登入失敗', text: data.message});
                }
            } catch (error) {
                console.error('Error:', error);
                alert('系統連線失敗，請稍後再試');
            }
        }
    </script>
</body>
</html>
